<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin & Spill — Truth or Dare</title>
  <meta name="description" content="Real-time multiplayer Truth or Dare party game with a skribbl.io sketch vibe!" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="min-h-screen overflow-x-hidden" oncontextmenu="return false">

  <!-- Decorative Crayons -->
  <div class="crayon-strip">
    <span style="background:#e88b8b"></span>
    <span style="background:#f0c674"></span>
    <span style="background:#7ec88b"></span>
    <span style="background:#7ec8e3"></span>
    <span style="background:#b8a9e8"></span>
  </div>

  <!-- ═══════════ HOME SCREEN ═══════════ -->
  <section id="screen-home" class="screen active flex-col items-center justify-center min-h-screen px-4">
    <div class="text-center mb-8 animate-float">
      <h1 class="sketch-title">SPIN<br />&amp; SPILL</h1>
      <p class="text-gray-500 mt-2 text-xl tracking-wide">Truth or Dare — No Escape Edition ✏️</p>
    </div>
    <div class="sketch-card w-full max-w-md p-8 space-y-5">
      <div>
        <label class="block text-sm text-gray-500 mb-1.5">Your Name</label>
        <input id="input-name" type="text" maxlength="16" placeholder="Enter your name..."
          class="sketch-input w-full" />
      </div>
      <button id="btn-create" class="btn-sketch btn-create w-full py-3.5 rounded-xl text-lg">
        Create Room
      </button>
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="text-gray-400 text-sm">or join</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>
      <div class="flex gap-2">
        <input id="input-code" type="text" maxlength="6" placeholder="CODE..."
          class="sketch-input flex-1 uppercase tracking-widest text-center font-bold" />
        <button id="btn-join" class="btn-sketch btn-join px-6 py-3">Join</button>
      </div>
      <p id="home-error" class="text-red-500 text-sm text-center hidden"></p>
    </div>
  </section>

  <!-- ═══════════ LOBBY SCREEN ═══════════ -->
  <section id="screen-lobby" class="screen flex-col items-center min-h-screen px-4 py-8">
    <div class="text-center mb-6">
      <p class="text-gray-500 text-sm mb-1">Room Code</p>
      <div class="flex items-center justify-center gap-3">
        <h2 id="lobby-code" class="text-4xl font-black tracking-[0.3em] text-blue-600"></h2>
        <button id="btn-copy-code" class="text-gray-400 hover:text-gray-700 transition" title="Copy code">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
        </button>
      </div>
      <p id="lobby-link" class="text-gray-400 text-xs mt-1 cursor-pointer hover:text-gray-600 transition"></p>
    </div>

    <!-- Players -->
    <div class="sketch-card w-full max-w-lg p-6 mb-6">
      <h3 class="text-xl font-bold mb-4 text-gray-600">Players</h3>
      <div id="lobby-players" class="space-y-2"></div>
    </div>

    <!-- Host Controls (no bottle grid) -->
    <div id="host-controls" class="w-full max-w-lg space-y-4 hidden">
      <div class="sketch-card-alt p-6">
        <h3 class="text-xl font-bold mb-4 text-gray-600">Spins</h3>
        <div class="grid grid-cols-4 gap-2">
          <button class="mode-btn" data-mode="20">20</button>
          <button class="mode-btn active" data-mode="30">30</button>
          <button class="mode-btn" data-mode="40">40</button>
          <button class="mode-btn" data-mode="50">50</button>
        </div>
      </div>
      <button id="btn-start" class="btn-sketch btn-start w-full py-4 text-xl">
        Start Game
      </button>
      <p id="lobby-error" class="text-red-500 text-sm text-center hidden"></p>
    </div>

    <div id="guest-waiting" class="sketch-card w-full max-w-lg p-6 text-center hidden">
      <div class="spinner mx-auto mb-3"></div>
      <p class="text-gray-500">Waiting for host to start...</p>
      <p class="text-sm text-gray-400 mt-2">Mode: <span id="guest-mode" class="font-bold text-gray-700">30</span> Spins
      </p>
    </div>
  </section>

  <!-- ═══════════ GAME SCREEN ═══════════ -->
  <section id="screen-game" class="screen flex-col min-h-screen">
    <!-- Top Bar -->
    <header
      class="flex items-center justify-between px-4 py-3 bg-white/50 border-b-3 border-b border-gray-300 z-30 shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">ROOM</span>
        <span id="game-code" class="font-bold text-blue-600 tracking-wider text-sm"></span>
      </div>
      <div class="text-center">
        <span class="text-xs text-gray-400">SPIN</span>
        <span id="spin-current" class="font-bold text-lg ml-1">0</span>
        <span class="text-gray-400">/</span>
        <span id="spin-max" class="font-bold text-gray-500">30</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="text-right">
          <span class="text-xs text-gray-400">TURN</span>
          <span id="turn-name" class="font-bold text-purple-600 ml-1 text-sm"></span>
        </div>
        <button id="btn-close-room" class="btn-sketch btn-close-room px-3 py-1 text-sm hidden">Close Room</button>
      </div>
    </header>

    <!-- Game Area -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
      <div class="flex-1 relative flex items-center justify-center p-4 min-h-[60vh] lg:min-h-0">
        <!-- Player Circle -->
        <div id="player-circle" class="relative w-[min(85vw,500px)] h-[min(85vw,500px)]">
          <div id="bottle-container" class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
            <div id="spinning-bottle" class="w-16 h-40 transition-none origin-center"></div>
          </div>
        </div>

        <!-- Spin Button -->
        <button id="btn-spin"
          class="absolute bottom-8 left-1/2 -translate-x-1/2 btn-sketch btn-spin-action px-8 py-3 rounded-full text-lg z-20 hidden">
          Spin!
        </button>

        <!-- Choice Overlay -->
        <div id="choice-overlay"
          class="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center z-20 hidden">
          <div class="sketch-card p-8 text-center max-w-sm mx-4">
            <p class="text-gray-500 mb-2" id="choice-label">Your turn!</p>
            <h3 id="choice-player-name" class="text-2xl font-bold mb-6"></h3>
            <div class="flex gap-4 justify-center">
              <button id="btn-truth" class="btn-sketch btn-truth-choice px-8 py-4 text-lg">😇 Truth</button>
              <button id="btn-dare" class="btn-sketch btn-dare-choice px-8 py-4 text-lg">😈 Dare</button>
            </div>
          </div>
        </div>

        <!-- Truth Overlay -->
        <div id="truth-overlay"
          class="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center z-20 hidden">
          <div class="sketch-card p-8 max-w-md mx-4 w-full">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-2xl">💡</span>
              <h3 class="text-xl font-bold">Spill the Truth!</h3>
            </div>
            <p id="truth-prompt" class="text-gray-500 mb-4 text-sm"></p>
            <textarea id="truth-input" rows="3" maxlength="500" placeholder="Type your truth..."
              class="sketch-input w-full resize-none"></textarea>
            <button id="btn-submit-truth" class="btn-sketch btn-truth-choice w-full py-3 mt-3">
              Submit Truth
            </button>
            <p id="truth-waiting" class="text-gray-400 text-center mt-4 hidden">
              <span class="spinner-sm inline-block mr-2"></span>Waiting for answer...
            </p>
          </div>
        </div>

        <!-- Dare Overlay -->
        <div id="dare-overlay"
          class="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center z-20 hidden">
          <div class="sketch-card p-6 max-w-lg mx-4 w-full">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-2xl">📷</span>
              <h3 class="text-xl font-bold text-red-500">Dare Active!</h3>
            </div>
            <p id="dare-player-label" class="text-gray-500 mb-4 text-sm"></p>
            <div id="dare-video-container"
              class="relative w-full aspect-video bg-gray-100 rounded-xl overflow-hidden mb-4 border-3 border-gray-800"
              style="border:3px solid #2d2d2d; border-radius: 15px 225px 255px 15px / 225px 15px 15px 255px;">
              <video id="dare-local-video" class="w-full h-full object-cover" autoplay muted playsinline></video>
              <video id="dare-remote-video" class="w-full h-full object-cover hidden" autoplay playsinline></video>
              <div id="dare-video-placeholder" class="absolute inset-0 flex items-center justify-center">
                <div class="text-center">
                  <div class="text-4xl mb-2">📷</div>
                  <p class="text-gray-400 text-sm">Camera activating...</p>
                </div>
              </div>
            </div>
            <button id="btn-dare-complete" class="btn-sketch btn-start w-full py-3 hidden">
              Dare Completed
            </button>
          </div>
        </div>
      </div>

      <!-- Chat -->
      <div id="chat-panel"
        class="chat-panel-sketch lg:w-80 border-t lg:border-t-0 lg:border-l border-gray-300 flex flex-col shrink-0 max-h-[40vh] lg:max-h-none">
        <button id="btn-toggle-chat"
          class="lg:hidden flex items-center justify-center gap-2 py-2 text-gray-500 hover:text-gray-800 transition">
          <span>💬 Chat</span>
          <svg class="w-4 h-4 chat-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
          </svg>
        </button>
        <div id="chat-body" class="flex-1 flex flex-col overflow-hidden">
          <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar"></div>
          <div class="p-3 border-t border-gray-200">
            <div class="flex gap-2">
              <input id="chat-input" type="text" maxlength="500" placeholder="Type a message..."
                class="sketch-input flex-1 text-sm py-2" />
              <button id="btn-send-chat" class="btn-sketch btn-send px-4 py-2">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════ GAME OVER ═══════════ -->
  <section id="screen-gameover" class="screen flex-col items-center justify-center min-h-screen px-4 py-8">
    <div class="text-center mb-8">
      <h2 class="sketch-title">GAME OVER</h2>
      <p class="text-gray-500 mt-2 text-xl">Here's who spilled the most 👀</p>
    </div>
    <div class="sketch-card w-full max-w-lg p-6">
      <div id="leaderboard" class="space-y-3"></div>
    </div>
    <button id="btn-play-again" class="btn-sketch btn-create px-8 py-3 text-lg mt-8">
      Play Again?
    </button>
  </section>

  <!-- Privacy Overlay (anti-screenshot) -->
  <div id="privacy-overlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>

</html>
